services:
  postgres:
    # TimescaleDB = PostgreSQL + 时序扩展（自动分块 hypertable / 连续聚合 / 压缩 / 保留策略）。
    # 镜像已预置 shared_preload_libraries=timescaledb，应用启动时 CREATE EXTENSION 即可。
    image: timescale/timescaledb:latest-pg17
    container_name: ingot-postgres
    environment:
      POSTGRES_DB: ingot
      POSTGRES_USER: ingot
      POSTGRES_PASSWORD: ${INGOT_POSTGRES_PASSWORD:?INGOT_POSTGRES_PASSWORD is required}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ingot-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ingot -d ingot"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  platform-api:
    build:
      context: .
      dockerfile: src/platform/Ingot.Platform.Api/Dockerfile
    container_name: ingot-platform-api
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./Data:/app/Data
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Urls: http://+:8000
      ConnectionStrings__Events: Host=postgres;Port=5432;Database=ingot;Username=ingot;Password=${INGOT_POSTGRES_PASSWORD:?INGOT_POSTGRES_PASSWORD is required}
      EventIngest__RequireToken: "true"
      EventIngest__EdgeTokens__EDGE-001: ${INGOT_EDGE_TOKEN:?INGOT_EDGE_TOKEN is required}
      InspectionSubmission__RequireToken: "true"
      InspectionSubmission__ActorTokens__OPERATOR-001: ${INGOT_OPERATOR_TOKEN:?INGOT_OPERATOR_TOKEN is required}
      Chat__Enabled: ${INGOT_CHAT_ENABLED:-false}
      Chat__Provider: ${INGOT_CHAT_PROVIDER:-Deterministic}
      Chat__FastModel: ${INGOT_CHAT_FAST_MODEL:-deterministic-v1}
      Chat__ReasoningModel: ${INGOT_CHAT_REASONING_MODEL:-deterministic-v1}
      Chat__EnableDeepInvestigation: ${INGOT_CHAT_ENABLE_DEEP_INVESTIGATION:-false}
      Chat__MaxToolCalls: ${INGOT_CHAT_MAX_TOOL_CALLS:-8}
      Chat__MaxRunSeconds: ${INGOT_CHAT_MAX_RUN_SECONDS:-60}
      Chat__MaxDiscussionRounds: ${INGOT_CHAT_MAX_DISCUSSION_ROUNDS:-3}
      Chat__MaxDiscussionTurns: ${INGOT_CHAT_MAX_DISCUSSION_TURNS:-9}
      Chat__RequireToken: "true"
      Chat__ActorTokens__operator: ${INGOT_CHAT_OPERATOR_TOKEN:-}
      ChatDataAccess__Actors__operator__AllowAll: ${INGOT_CHAT_OPERATOR_ALLOW_ALL:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      Cors__AllowedOrigins__0: http://localhost:3000
      Webhook__Enabled: "true"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  platform-web:
    build:
      context: src/platform/Ingot.Platform.Web
      dockerfile: Dockerfile
    container_name: ingot-platform-web
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      platform-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  connector-host:
    profiles:
      - connector-host
    build:
      context: .
      dockerfile: src/edge/Ingot.Edge.ConnectorHost/Dockerfile
    container_name: ingot-connector-host
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      - ./Data/connector-host:/app/Data
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Urls: http://+:8001
      ConnectorHost__IngestToken: ${INGOT_CONNECTOR_TOKEN:?INGOT_CONNECTOR_TOKEN is required}
      Edge__PlatformApiBaseUrl: http://platform-api:8000
      Edge__EventIngestToken: ${INGOT_EDGE_TOKEN:?INGOT_EDGE_TOKEN is required}
    depends_on:
      platform-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8001/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

volumes:
  ingot-postgres-data:
