services:
  postgres:
    image: postgres:18-alpine
    container_name: ingot-postgres
    environment:
      POSTGRES_DB: ingot
      POSTGRES_USER: ingot
      POSTGRES_PASSWORD: ingot
    ports:
      - "5432:5432"
    volumes:
      - ingot-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ingot -d ingot"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  central-api:
    build:
      context: .
      dockerfile: src/Ingot.Central.Api/Dockerfile
    container_name: ingot-central-api
    ports:
      - "8000:8000"
    volumes:
      - ./Data:/app/Data # SQLite DB 持久化 (Data/central.db)
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Urls=http://+:8000
      - ConnectionStrings__Events=Host=postgres;Port=5432;Database=ingot;Username=ingot;Password=ingot
      - EventIngest__RequireToken=true
      - EventIngest__EdgeTokens__EDGE-001=change-me-edge-001
      - Webhook__Enabled=true
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  central-web:
    build:
      context: src/Ingot.Central.Web
      dockerfile: Dockerfile
    container_name: ingot-central-web
    ports:
      - "3000:80"
    depends_on:
      - central-api
    restart: unless-stopped

volumes:
  ingot-postgres-data:
