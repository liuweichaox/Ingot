name: Disconnect acceptance

on:
  workflow_dispatch:
    inputs:
      disconnect_seconds:
        description: Central outage duration in seconds; use 7200 for RFC Phase 3 acceptance
        required: true
        default: "7200"

permissions:
  contents: read

jobs:
  disconnect-recovery:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    env:
      INGOT_DISCONNECT_SECONDS: ${{ inputs.disconnect_seconds }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Ingot.sln

      - name: Verify disconnect recovery
        run: ./scripts/verify-disconnect-recovery.sh

      - name: Verify CloudEvents webhook delivery
        run: ./scripts/verify-webhook-delivery.sh
