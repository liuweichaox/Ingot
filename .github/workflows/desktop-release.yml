name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version from desktop/package.json, without the agent-v prefix
        required: true
        type: string
  push:
    tags:
      - agent-v*

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate release version
        id: version
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const packageVersion = require('./desktop/package.json').version;
          const tauriVersion = require('./desktop/src-tauri/tauri.conf.json').version;
          const cargo = fs.readFileSync('./desktop/src-tauri/Cargo.toml', 'utf8');
          const cargoVersion = cargo.match(/^version\s*=\s*"([^"]+)"/m)?.[1];
          const versions = [packageVersion, tauriVersion, cargoVersion];
          if (versions.some((value) => value !== packageVersion)) {
            throw new Error(`Desktop versions differ: ${versions.join(', ')}`);
          }
          const expectedTag = `agent-v${packageVersion}`;
          if (process.env.GITHUB_EVENT_NAME === 'push' && process.env.GITHUB_REF_NAME !== expectedTag) {
            throw new Error(`Release tag must be ${expectedTag}.`);
          }
          if (process.env.GITHUB_EVENT_NAME === 'workflow_dispatch' && process.env.REQUESTED_VERSION !== packageVersion) {
            throw new Error(`Requested version must be ${packageVersion}.`);
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${packageVersion}\n`);
          NODE

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.100.0
        with:
          components: rustfmt

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./desktop/src-tauri -> target

      - name: Verify desktop release source
        run: |
          npm --prefix desktop ci
          npm --prefix desktop run test
          npm --prefix desktop run lint
          npm --prefix desktop run build
          npm --prefix desktop audit --omit=dev
          cargo fmt --manifest-path desktop/src-tauri/Cargo.toml -- --check
          cargo test --manifest-path desktop/src-tauri/Cargo.toml --locked
          cargo check --manifest-path desktop/src-tauri/Cargo.toml --locked

  publish:
    name: ${{ matrix.name }}
    needs: validate
    environment: desktop-release
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - name: macOS x64
            platform: macos-latest
            args: --target x86_64-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - name: Linux x64
            platform: ubuntu-22.04
            args: ""
            rust-targets: ""
          - name: Windows x64
            platform: windows-latest
            args: ""
            rust-targets: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install --yes libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.100.0
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./desktop/src-tauri -> target

      - name: Install frontend dependencies
        run: npm --prefix desktop ci

      - name: Import macOS signing certificate
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          test -n "$APPLE_CERTIFICATE"
          test -n "$APPLE_CERTIFICATE_PASSWORD"
          test -n "$KEYCHAIN_PASSWORD"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/ingot-agent.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import "$RUNNER_TEMP/ingot-agent.p12" -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          identity=$(security find-identity -v -p codesigning build.keychain | awk -F'"' '/Developer ID Application/{print $2; exit}')
          test -n "$identity"
          echo "APPLE_SIGNING_IDENTITY=$identity" >> "$GITHUB_ENV"

      - name: Import Windows signing certificate
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE) -or
              [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD) -or
              [string]::IsNullOrWhiteSpace($env:WINDOWS_TIMESTAMP_URL)) {
            throw "Windows signing secrets are required."
          }
          $certificatePath = Join-Path $env:RUNNER_TEMP "ingot-agent.pfx"
          [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $password = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          $certificate = Import-PfxCertificate -FilePath $certificatePath -CertStoreLocation Cert:\CurrentUser\My -Password $password
          $configuration = @{
            bundle = @{
              windows = @{
                certificateThumbprint = $certificate.Thumbprint
                digestAlgorithm = "sha256"
                timestampUrl = $env:WINDOWS_TIMESTAMP_URL
              }
            }
          }
          $configuration | ConvertTo-Json -Depth 4 | Set-Content desktop/src-tauri/tauri.windows.conf.json

      - name: Build signed draft release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: desktop
          tagName: agent-v__VERSION__
          releaseName: Ingot Agent v__VERSION__
          releaseBody: Signed Ingot Agent installers for macOS, Windows, and Linux.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }} -- --locked
