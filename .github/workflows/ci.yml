name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            src/Ingot.Central.Web/package-lock.json
            desktop/package-lock.json
            site/package-lock.json
            docs-site/package-lock.json

      - name: Prepare Connector Builder image
        run: docker pull mcr.microsoft.com/dotnet/sdk:10.0

      - name: Verify repository
        env:
          INGOT_RUN_CONNECTOR_CONTAINER_TEST: "1"
        run: ./scripts/verify.sh

      - name: Build application images
        env:
          INGOT_POSTGRES_PASSWORD: verification-postgres-password
          INGOT_EDGE_TOKEN: verification-edge-token-0001
          INGOT_OPERATOR_TOKEN: verification-operator-token-0001
          INGOT_CONNECTOR_TOKEN: verification-connector-token-0001
        run: docker compose -f docker-compose.app.yml build central-api central-web connector-host

      - name: Smoke application stack
        env:
          INGOT_POSTGRES_PASSWORD: verification-postgres-password
          INGOT_EDGE_TOKEN: verification-edge-token-0001
          INGOT_OPERATOR_TOKEN: verification-operator-token-0001
          INGOT_CONNECTOR_TOKEN: verification-connector-token-0001
        run: |
          docker compose -f docker-compose.app.yml up -d --no-build --wait
          curl --fail --silent http://127.0.0.1:3000/health
          curl --fail --silent http://127.0.0.1:8000/health
          curl --fail --silent http://127.0.0.1:8001/health

      - name: Build public-site images
        run: docker compose -f deploy/compose.yml --profile site --profile docs build site docs

      - name: Stop application stack
        if: always()
        env:
          INGOT_POSTGRES_PASSWORD: verification-postgres-password
          INGOT_EDGE_TOKEN: verification-edge-token-0001
          INGOT_OPERATOR_TOKEN: verification-operator-token-0001
          INGOT_CONNECTOR_TOKEN: verification-connector-token-0001
        run: docker compose -f docker-compose.app.yml down -v --remove-orphans

  desktop-native:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable

      - name: Build desktop frontend
        run: |
          npm --prefix desktop ci
          npm --prefix desktop run build

      - name: Verify desktop native core
        run: |
          cargo fmt --manifest-path desktop/src-tauri/Cargo.toml -- --check
          cargo test --manifest-path desktop/src-tauri/Cargo.toml --locked
          cargo check --manifest-path desktop/src-tauri/Cargo.toml --locked
